<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Projectile Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Main Simulation Canvas -->
        <div class="simulation-area">
            <canvas id="simCanvas"></canvas>
            <div class="distance-readout">
                Distance: <span id="distanceValue">0.00 m</span>
                <br>
                Altitude: <span id="heightValue">1.50 m</span>
            </div>

            <div class="equations-panel">
                <div style="font-weight:700; color:var(--text-primary); margin-bottom: 8px; font-size: 18px;">Governing Equations</div>
                <div><strong>Gravity accel (a):</strong> g &times; (R<sub>earth</sub> / r)&sup2;</div>
                <div><strong>Orbit Speed (v<sub>o</sub>):</strong> &radic;(g &times; R<sub>earth</sub>&sup2; / r)</div>
                <div><strong>Escape Speed (v<sub>e</sub>):</strong> &radic;(2 &times; g &times; R<sub>earth</sub>&sup2; / r)</div>
            </div>

            <!-- Alert for out-of-bounds -->
            <div id="outOfBoundsAlert" class="alert hidden">
                Ball escaped gravity/bounds! Reset to continue.
            </div>
        </div>

        <!-- Control Panel (Glassmorphism) -->
        <div class="control-panel">
            <h1>Projectile Motion</h1>
            <p class="subtitle">Physics Simulation</p>
            
            <div class="control-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label for="speedInput">Speed (km/h)</label>
                    <div>
                        <button id="orbitSpeedBtn" style="background:none; border:none; color:var(--accent-color); cursor:pointer; font-size:12px; font-family:inherit; font-weight:600; padding:0 5px;">🚀 Orbit</button>
                        <button id="escapeSpeedBtn" style="background:none; border:none; color:var(--accent-color); cursor:pointer; font-size:12px; font-family:inherit; font-weight:600; padding:0;">☄️ Escape</button>
                    </div>
                </div>
                <div class="input-wrapper">
                    <input type="number" id="speedInput" value="50" min="1" step="1">
                    <span class="unit">km/h</span>
                </div>
            </div>

            <div class="control-group">
                <label for="angleInput">Throw Angle (°)</label>
                <div class="input-wrapper">
                    <input type="number" id="angleInput" value="45" min="0" max="90" step="1">
                    <span class="unit">deg</span>
                </div>
            </div>

            <div class="control-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label for="gravityInput">Gravity (m/s²)</label>
                    <button id="resetGravityBtn" style="background:none; border:none; color:var(--accent-color); cursor:pointer; font-size:12px; font-family:inherit; font-weight:600; padding:0;">↺ Default</button>
                </div>
                <div class="input-wrapper">
                    <input type="number" id="gravityInput" value="9.81" min="0.1" step="0.01">
                    <span class="unit">m/s²</span>
                </div>
            </div>

            <div class="control-group">
                <label for="heightInput">Start Height (km)</label>
                <div class="input-wrapper">
                    <input type="number" id="heightInput" value="1000" min="0" step="100">
                    <span class="unit">km</span>
                </div>
            </div>

            <div class="control-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label for="timeWarpInput">Time Warp</label>
                    <span id="timeWarpDisplay" style="color:var(--text-secondary); font-size:12px; font-weight:600;">100x</span>
                </div>
                <div class="input-wrapper" style="padding: 10px 0;">
                    <input type="range" id="timeWarpInput" min="0" max="4" step="0.1" value="2" style="width: 100%;">
                </div>
            </div>

            <div class="action-buttons">
                <button id="startBtn" class="btn primary">Start Throw</button>
                <button id="resetBtn" class="btn secondary">Reset</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
